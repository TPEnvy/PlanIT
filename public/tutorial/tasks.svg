<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">PlanIT tasks and calendar page</title>
  <desc id="desc">A visual guide showing the task page with a calendar, scheduled and to-do tabs, status filters, and ranked task cards.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#064e3b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#page)"/>
  <rect width="1200" height="70" fill="#ffffff"/>
  <rect x="84" y="19" width="34" height="34" rx="10" fill="#059669"/>
  <text x="101" y="42" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">P</text>
  <text x="130" y="41" fill="#065f46" font-size="22" font-weight="700" font-family="Arial, sans-serif">PlanIT</text>
  <text x="720" y="41" fill="#334155" font-size="15" font-family="Arial, sans-serif">Dashboard</text>
  <text x="810" y="41" fill="#047857" font-size="15" font-family="Arial, sans-serif">Tasks</text>
  <text x="870" y="41" fill="#334155" font-size="15" font-family="Arial, sans-serif">Tutorial</text>

  <text x="90" y="124" fill="#065f46" font-size="36" font-weight="800" font-family="Arial, sans-serif">Tasks</text>
  <text x="90" y="152" fill="#475569" font-size="16" font-family="Arial, sans-serif">Scheduled tasks appear on the calendar. To-do tasks stay flexible.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="188" width="320" height="500" rx="20" fill="#ffffff"/>
    <rect x="440" y="188" width="670" height="500" rx="20" fill="#ffffff"/>
  </g>

  <text x="118" y="230" fill="#065f46" font-size="18" font-weight="800" font-family="Arial, sans-serif">April 2026</text>
  <rect x="300" y="210" width="72" height="28" rx="14" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="336" y="229" fill="#047857" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">Next</text>
  <g fill="#64748b" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">
    <text x="126" y="272">Sun</text><text x="168" y="272">Mon</text><text x="210" y="272">Tue</text><text x="252" y="272">Wed</text><text x="294" y="272">Thu</text><text x="336" y="272">Fri</text><text x="378" y="272">Sat</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" text-anchor="middle">
    <circle cx="126" cy="312" r="18" fill="#ffffff"/><text x="126" y="317" fill="#475569">5</text>
    <circle cx="168" cy="312" r="18" fill="#ffffff"/><text x="168" y="317" fill="#475569">6</text>
    <circle cx="210" cy="312" r="18" fill="#ecfdf5" stroke="#34d399"/><text x="210" y="317" fill="#065f46">7</text>
    <circle cx="252" cy="312" r="18" fill="#059669"/><text x="252" y="317" fill="#ffffff" font-weight="800">8</text>
    <circle cx="294" cy="312" r="18" fill="#ffffff"/><text x="294" y="317" fill="#475569">9</text>
    <circle cx="336" cy="312" r="18" fill="#ffffff"/><text x="336" y="317" fill="#475569">10</text>
    <circle cx="378" cy="312" r="18" fill="#ffffff"/><text x="378" y="317" fill="#475569">11</text>

    <circle cx="126" cy="362" r="18" fill="#ffffff"/><text x="126" y="367" fill="#475569">12</text>
    <circle cx="168" cy="362" r="18" fill="#ffffff"/><text x="168" y="367" fill="#475569">13</text>
    <circle cx="210" cy="362" r="18" fill="#ffffff"/><text x="210" y="367" fill="#475569">14</text>
    <circle cx="252" cy="362" r="18" fill="#ecfdf5"/><text x="252" y="367" fill="#065f46">15</text>
    <circle cx="294" cy="362" r="18" fill="#ffffff"/><text x="294" y="367" fill="#475569">16</text>
    <circle cx="336" cy="362" r="18" fill="#ffffff"/><text x="336" y="367" fill="#475569">17</text>
    <circle cx="378" cy="362" r="18" fill="#ffffff"/><text x="378" y="367" fill="#475569">18</text>
  </g>
  <g fill="#10b981">
    <circle cx="252" cy="336" r="4"/>
    <circle cx="210" cy="336" r="4"/>
    <circle cx="252" cy="386" r="4"/>
  </g>
  <rect x="118" y="454" width="120" height="30" rx="15" fill="#ecfdf5" stroke="#a7f3d0"/>

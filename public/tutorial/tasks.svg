  <rect x="246" y="454" width="126" height="30" rx="15" fill="#059669"/>
  <text x="309" y="474" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">Add task</text>
  <text x="118" y="535" fill="#475569" font-size="13" font-family="Arial, sans-serif">Green dots show active scheduled days.</text>
  <text x="118" y="560" fill="#475569" font-size="13" font-family="Arial, sans-serif">Select a date to filter the list.</text>

  <rect x="475" y="222" width="252" height="40" rx="20" fill="#ecfdf5"/>
  <rect x="480" y="227" width="140" height="30" rx="15" fill="#059669"/>
  <text x="550" y="247" fill="#ffffff" font-size="13" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">Scheduled</text>
  <text x="672" y="247" fill="#047857" font-size="13" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">To-Do Tasks</text>
  <rect x="962" y="220" width="110" height="40" rx="12" fill="#059669"/>
  <text x="1017" y="246" fill="#ffffff" font-size="14" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">+ New task</text>

  <text x="475" y="296" fill="#64748b" font-size="13" font-family="Arial, sans-serif">Status:</text>
  <rect x="532" y="278" width="72" height="28" rx="14" fill="#059669"/>
  <text x="568" y="297" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">Pending</text>
  <rect x="614" y="278" width="50" height="28" rx="14" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="639" y="297" fill="#047857" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">All</text>
  <rect x="674" y="278" width="92" height="28" rx="14" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="720" y="297" fill="#047857" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">Completed</text>
  <rect x="776" y="278" width="70" height="28" rx="14" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="811" y="297" fill="#047857" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">Missed</text>

  <circle cx="496" cy="363" r="18" fill="#ef4444"/>
  <text x="496" y="369" fill="#ffffff" font-size="15" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">1</text>
  <rect x="532" y="330" width="520" height="76" rx="14" fill="#f8fafc" stroke="#d1fae5"/>
  <text x="558" y="360" fill="#111827" font-size="18" font-weight="800" font-family="Arial, sans-serif">Review research chapter</text>
  <text x="558" y="385" fill="#64748b" font-size="13" font-family="Arial, sans-serif">Apr 8, 9:00 AM to 11:30 AM - Priority score 94</text>
  <rect x="920" y="348" width="80" height="28" rx="14" fill="#fef3c7"/>
  <text x="960" y="367" fill="#92400e" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">Urgent</text>

  <circle cx="496" cy="465" r="18" fill="#059669"/>
  <text x="496" y="471" fill="#ffffff" font-size="15" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">2</text>
  <rect x="532" y="432" width="520" height="76" rx="14" fill="#f8fafc" stroke="#d1fae5"/>
  <text x="558" y="462" fill="#111827" font-size="18" font-weight="800" font-family="Arial, sans-serif">Prepare presentation slides</text>
  <text x="558" y="487" fill="#64748b" font-size="13" font-family="Arial, sans-serif">Apr 8, 1:00 PM to 3:00 PM - Recommended break 24 min</text>
  <rect x="890" y="450" width="110" height="28" rx="14" fill="#dbeafe"/>
  <text x="945" y="469" fill="#1d4ed8" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">Can split</text>

  <circle cx="496" cy="567" r="18" fill="#059669"/>
  <text x="496" y="573" fill="#ffffff" font-size="15" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">3</text>
  <rect x="532" y="534" width="520" height="76" rx="14" fill="#f8fafc" stroke="#d1fae5"/>
  <text x="558" y="564" fill="#111827" font-size="18" font-weight="800" font-family="Arial, sans-serif">Clean study desk</text>
  <text x="558" y="589" fill="#64748b" font-size="13" font-family="Arial, sans-serif">To-do task - Flexible timing - No calendar date</text>
  <rect x="910" y="552" width="90" height="28" rx="14" fill="#dcfce7"/>
  <text x="955" y="571" fill="#166534" font-size="12" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">To-Do</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">PlanIT create task form</title>
  <desc id="desc">A visual guide showing the create task form with mode selection, start and end fields, task settings, and create button.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#064e3b" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#page)"/>
  <rect width="1200" height="70" fill="#ffffff"/>
  <rect x="84" y="19" width="34" height="34" rx="10" fill="#059669"/>
  <text x="101" y="42" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">P</text>
  <text x="130" y="41" fill="#065f46" font-size="22" font-weight="700" font-family="Arial, sans-serif">PlanIT</text>

  <g filter="url(#shadow)">
    <rect x="310" y="108" width="580" height="584" rx="22" fill="#ffffff"/>
  </g>
  <text x="350" y="158" fill="#065f46" font-size="30" font-weight="800" font-family="Arial, sans-serif">Create Task</text>
  <text x="350" y="184" fill="#64748b" font-size="15" font-family="Arial, sans-serif">Add a new scheduled or flexible task.</text>

  <text x="350" y="236" fill="#047857" font-size="14" font-weight="700" font-family="Arial, sans-serif">Task Title</text>
  <rect x="350" y="250" width="500" height="48" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <text x="372" y="280" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">Review research chapter</text>

  <rect x="350" y="326" width="342" height="42" rx="21" fill="#ecfdf5"/>
  <rect x="356" y="332" width="190" height="30" rx="15" fill="#059669"/>
  <text x="451" y="352" fill="#ffffff" font-size="13" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">Scheduled task</text>
  <text x="616" y="352" fill="#047857" font-size="13" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">To-Do Task</text>

  <text x="350" y="414" fill="#047857" font-size="14" font-weight="700" font-family="Arial, sans-serif">Start Date</text>
  <text x="610" y="414" fill="#047857" font-size="14" font-weight="700" font-family="Arial, sans-serif">End Date</text>
  <rect x="350" y="428" width="230" height="48" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <rect x="610" y="428" width="240" height="48" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <text x="372" y="458" fill="#334155" font-size="14" font-family="Arial, sans-serif">2026-04-28</text>
  <text x="632" y="458" fill="#334155" font-size="14" font-family="Arial, sans-serif">2026-04-28</text>

  <text x="350" y="514" fill="#047857" font-size="14" font-weight="700" font-family="Arial, sans-serif">Start Time</text>
  <text x="610" y="514" fill="#047857" font-size="14" font-weight="700" font-family="Arial, sans-serif">End Time</text>
  <rect x="350" y="528" width="230" height="48" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <rect x="610" y="528" width="240" height="48" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <text x="372" y="558" fill="#334155" font-size="14" font-family="Arial, sans-serif">09:00</text>
  <text x="632" y="558" fill="#334155" font-size="14" font-family="Arial, sans-serif">11:30</text>

  <rect x="350" y="608" width="146" height="44" rx="10" fill="#f8fafc" stroke="#d1fae5"/>
  <rect x="514" y="608" width="146" height="44" rx="10" fill="#f8fafc" stroke="#d1fae5"/>
  <rect x="678" y="608" width="172" height="44" rx="10" fill="#f8fafc" stroke="#d1fae5"/>
  <text x="372" y="635" fill="#065f46" font-size="13" font-weight="700" font-family="Arial, sans-serif">Urgent</text>
  <text x="536" y="635" fill="#065f46" font-size="13" font-weight="700" font-family="Arial, sans-serif">Important</text>
  <text x="700" y="635" fill="#065f46" font-size="13" font-weight="700" font-family="Arial, sans-serif">Medium difficulty</text>

  <text x="350" y="680" fill="#475569" font-size="13" font-family="Arial, sans-serif">Estimated duration:</text>
  <text x="477" y="680" fill="#047857" font-size="13" font-weight="800" font-family="Arial, sans-serif">2.5 h</text>
  <rect x="650" y="660" width="84" height="38" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="692" y="684" fill="#334155" font-size="13" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">Cancel</text>
  <rect x="746" y="660" width="104" height="38" rx="10" fill="#059669"/>
  <text x="798" y="684" fill="#ffffff" font-size="13" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">Create Task</text>

  <g>
    <circle cx="242" cy="278" r="28" fill="#ffffff" opacity="0.92"/>
    <text x="242" y="288" fill="#059669" font-size="28" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">1</text>
    <text x="186" y="335" fill="#065f46" font-size="16" font-weight="800" font-family="Arial, sans-serif">Name the task</text>
    <text x="152" y="360" fill="#475569" font-size="13" font-family="Arial, sans-serif">Use a clear title so similar</text>
    <text x="164" y="380" fill="#475569" font-size="13" font-family="Arial, sans-serif">tasks can be grouped.</text>
    <line x1="282" y1="278" x2="344" y2="274" stroke="#059669" stroke-width="3" stroke-linecap="round"/>

    <circle cx="970" cy="348" r="28" fill="#ffffff" opacity="0.92"/>
    <text x="970" y="358" fill="#059669" font-size="28" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">2</text>
    <text x="922" y="405" fill="#065f46" font-size="16" font-weight="800" font-family="Arial, sans-serif">Pick a mode</text>
    <text x="900" y="430" fill="#475569" font-size="13" font-family="Arial, sans-serif">Choose scheduled for fixed</text>
    <text x="918" y="450" fill="#475569" font-size="13" font-family="Arial, sans-serif">work or to-do for flexible work.</text>
    <line x1="934" y1="348" x2="694" y2="348" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
